<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Logsheet Turbin Uap</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2921/2921822.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 20px;
      padding: 15px 0;
    }

    .header h1 {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }

    /* Settings */
    .settings-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .settings-card h3 {
      color: #1a237e;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }

    .config-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
      margin-top: 20px;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Form Sections */
    .section-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .section-card h3 {
      color: #1a237e;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e3f2fd;
      font-size: 1.1rem;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    /* Loading */
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.95);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading.active {
      display: flex;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 15px; color: #666;">Mengirim data...</p>
  </div>

  <div class="container">
    <div class="header">
      <h1>📝 Logsheet Turbin Uap</h1>
      <p>Input Data Sensor</p>
    </div>

    <!-- Settings -->
    <div class="settings-card" id="settingsCard">
      <h3>⚙️ Konfigurasi Server</h3>
      <input type="url" 
             id="scriptUrl" 
             class="config-input" 
             placeholder="https://script.google.com/macros/s/.../exec"
             value="">
      <button class="btn btn-primary" onclick="saveConfig()">
        Simpan & Lanjutkan
      </button>
      <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">
        *Masukkan URL Google Apps Script Web App
      </p>
    </div>

    <!-- Form -->
    <form id="pwa-form" class="hidden">
      <div id="form-fields"></div>
      
      <button type="submit" class="btn btn-success" id="btnSubmit">
        💾 Kirim ke Spreadsheet
      </button>
      
      <button type="button" class="btn btn-primary" onclick="resetConfig()" style="margin-top: 10px; background: #6c757d;">
        ⚙️ Ganti Server
      </button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
